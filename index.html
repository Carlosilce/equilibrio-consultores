<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Equilibrio Consultores – Consultoría contable y asesoría financiera profesional en Ciudad de México." />
  <title>Equilibrio Consultores</title>

  <!-- Google Fonts: Playfair Display (display) + DM Sans (cuerpo) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Estilos globales y de componentes -->
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

  <!-- ========== NAVEGACIÓN ========== -->
  <header class="navbar" id="navbar">
    <div class="container navbar__inner">
      <a href="#inicio" class="navbar__logo">
        <span class="logo-icon">⊖</span>
        Equilibrio <span>Consultores</span>
      </a>
      <nav class="navbar__links" id="navLinks">
        <a href="#servicios">Servicios</a>
        <a href="#testimonios">Clientes</a>
        <a href="#faq">FAQ</a>
        <a href="#contacto" class="btn btn--nav">Contáctanos</a>
      </nav>
      <!-- Botón hamburguesa para móvil -->
      <button class="navbar__hamburger" id="hamburger" aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ========== SECCIÓN HERO ========== -->
  <section id="inicio">
    <div id="hero-placeholder"></div>
  </section>

  <!-- ========== SECCIÓN SERVICIOS ========== -->
  <section id="servicios">
    <div id="servicios-placeholder"></div>
  </section>

  <!-- ========== SECCIÓN TESTIMONIOS ========== -->
  <section id="testimonios">
    <div id="testimonios-placeholder"></div>
  </section>

  <!-- ========== SECCIÓN FAQ ========== -->
  <section id="faq">
    <div id="faq-placeholder"></div>
  </section>

  <!-- ========== SECCIÓN CONTACTO ========== -->
  <section id="contacto">
    <div id="contacto-placeholder"></div>
  </section>

  <!-- ========== FOOTER ========== -->
  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__logo">⊖ Equilibrio Consultores</p>
      <p class="footer__copy">© 2025 Equilibrio Consultores · Ciudad de México · Todos los derechos reservados.</p>
      <nav class="footer__links">
        <a href="#servicios">Servicios</a>
        <a href="#faq">FAQ</a>
        <a href="#contacto">Contacto</a>
      </nav>
    </div>
  </footer>

  <!-- ========== BOTÓN FLOTANTE WHATSAPP ========== -->
  <!-- Para cambiar el número: busca la variable WHATSAPP_NUMBER en js/whatsapp.js -->
  <div id="whatsapp-placeholder"></div>

  <!-- Scripts principales -->
  <script src="js/main.js"></script>
  <script src="js/whatsapp.js"></script>

</body>
</html>
